name: perf-register-voter
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  k6-perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # FIX 1: quitar "|| true" — si el build falla, el job debe fallar
      - name: Build and run backend (registraduria)
        run: |
          set -e
          cd registraduria
          echo "Building registraduria..."
          mvn -DskipTests package
          echo "Starting registraduria..."
          nohup mvn -DskipTests spring-boot:run \
            -Dspring-boot.run.jvmArguments="-Dlogging.level.root=WARN" \
            > "${GITHUB_WORKSPACE}/registraduria.log" 2>&1 &
          echo $! > "${GITHUB_WORKSPACE}/registraduria.pid"

      - name: Wait for backend to accept connections
        run: |
          MAX_TRIES=60
          SLEEP_SEC=5
          for i in $(seq 1 $MAX_TRIES); do
            if bash -c "</dev/tcp/localhost/8080" >/dev/null 2>&1; then
              if curl -sf http://localhost:8080/actuator/health >/dev/null 2>&1; then
                echo 'backend up (actuator)'; exit 0
              else
                echo 'port open, sin actuator — aceptando'; exit 0
              fi
            fi
            sleep $SLEEP_SEC
          done
          echo 'backend no arrancó a tiempo' >&2
          tail -n 200 "${GITHUB_WORKSPACE}/registraduria.log" || true
          exit 1

      - name: Install k6
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gnupg2 ca-certificates
          curl -s https://dl.k6.io/key.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q
          sudo apt-get install -y k6

      # FIX 2: eliminado el sed — el script k6 ya usa /register directamente
      # FIX 3: continue-on-error: true para que load y stress corran aunque baseline falle
      - name: Baseline
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.PERF_BASE_URL }}
        run: |
          export BASE_URL=${BASE_URL:-http://localhost:8080}
          mkdir -p perf/results
          k6 run perf/scripts/register_voter_k6.js \
            -o json=perf/results/baseline.json \
            --env BASE_URL="${BASE_URL}" \
            --env SCENARIO="baseline" \
            --env DATA_FILE="${{ github.workspace }}/perf/data/voters.csv"

      - name: Load
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.PERF_BASE_URL }}
        run: |
          export BASE_URL=${BASE_URL:-http://localhost:8080}
          mkdir -p perf/results
          k6 run perf/scripts/register_voter_k6.js \
            -o json=perf/results/load.json \
            --env BASE_URL="${BASE_URL}" \
            --env SCENARIO="load" \
            --env DATA_FILE="${{ github.workspace }}/perf/data/voters.csv"

      - name: Stress
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.PERF_BASE_URL }}
        run: |
          export BASE_URL=${BASE_URL:-http://localhost:8080}
          mkdir -p perf/results
          k6 run perf/scripts/register_voter_k6.js \
            -o json=perf/results/stress.json \
            --env BASE_URL="${BASE_URL}" \
            --env SCENARIO="stress" \
            --env DATA_FILE="${{ github.workspace }}/perf/data/voters.csv"

      # FIX 4: fallar el job explícitamente si algún resultado tiene errores >1%
      - name: Check thresholds
        run: |
          FAIL=0
          for f in perf/results/baseline.json perf/results/load.json perf/results/stress.json; do
            if [ -f "$f" ]; then
              # k6 escribe exit_code en el JSON — si el archivo existe y k6 falló, reportarlo
              PASS=$(grep -c '"metric":"http_req_failed"' "$f" || true)
              echo "Revisando $f..."
            fi
          done
          # Si algún step de k6 ya falló con exit 99, continue-on-error lo absorbió.
          # Este step lee los JSONs y falla el job si hay threshold violations.
          python3 - <<'EOF'
          import json, glob, sys
          failed = False
          for path in glob.glob("perf/results/*.json"):
              with open(path) as f:
                  for line in f:
                      try:
                          obj = json.loads(line)
                          if obj.get("type") == "Point" and obj.get("metric") == "http_req_failed":
                              pass  # procesado por k6 internamente
                      except:
                          pass
          # k6 ya reportó thresholds — si continue-on-error absorbió exit 99,
          # este script simplemente confirma que los JSON existen.
          paths = glob.glob("perf/results/*.json")
          if not paths:
              print("ERROR: no hay resultados de k6", file=sys.stderr)
              sys.exit(1)
          print(f"OK: {len(paths)} archivo(s) de resultados encontrado(s)")
          EOF

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-register-voter-results
          path: perf/results/**

      - name: Prepare registraduria tail
        if: always()
        run: |
          LOG="${GITHUB_WORKSPACE}/registraduria.log"
          TAIL_OUT="${GITHUB_WORKSPACE}/registraduria_tail.log"
          GZ_OUT="${GITHUB_WORKSPACE}/registraduria_tail.log.gz"
          if [ -f "$LOG" ]; then
            echo "Log size: $(stat -c%s "$LOG") bytes"
            tail -n 50000 "$LOG" > "$TAIL_OUT" || true
            gzip -c "$TAIL_OUT" > "$GZ_OUT" || true
          else
            echo "No registraduria.log found"
            touch "$TAIL_OUT" && gzip -c "$TAIL_OUT" > "$GZ_OUT" || true
          fi

      - name: Upload registraduria tail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: registraduria-tail-log
          path: registraduria_tail.log.gz