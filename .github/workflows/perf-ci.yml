name: perf-register-voter
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  k6-perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build and run backend (registraduria)
        run: |
          set -e
          cd registraduria
          mvn -DskipTests package
          nohup mvn -DskipTests spring-boot:run \
            -Dspring-boot.run.jvmArguments="-Dlogging.level.root=WARN" \
            > "${GITHUB_WORKSPACE}/registraduria.log" 2>&1 &
          echo $! > "${GITHUB_WORKSPACE}/registraduria.pid"

      - name: Wait for backend to accept connections
        run: |
          MAX_TRIES=60
          SLEEP_SEC=5
          for i in $(seq 1 $MAX_TRIES); do
            if bash -c "</dev/tcp/localhost/8080" >/dev/null 2>&1; then
              if curl -sf http://localhost:8080/actuator/health >/dev/null 2>&1; then
                echo 'backend up (actuator)'; exit 0
              else
                echo 'port open, sin actuator — aceptando'; exit 0
              fi
            fi
            sleep $SLEEP_SEC
          done
          echo 'backend no arrancó a tiempo' >&2
          tail -n 200 "${GITHUB_WORKSPACE}/registraduria.log" || true
          exit 1

      - name: Install k6
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gnupg2 ca-certificates
          curl -s https://dl.k6.io/key.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q
          sudo apt-get install -y k6

      # baseline: constant-vus 20 VUs · 5 min → timeout 10 min
      - name: Baseline
        timeout-minutes: 10
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.PERF_BASE_URL }}
        run: |
          export BASE_URL=${BASE_URL:-http://localhost:8080}
          mkdir -p perf/results
          k6 run perf/scripts/register_person_k6.js \
            --env BASE_URL="${BASE_URL}" \
            --env SCENARIO="baseline" \
            --env DATA_FILE="${{ github.workspace }}/perf/data/persons.csv"

      # load: 2 + 10 + 2 = 14 min → timeout 20 min
      - name: Load
        timeout-minutes: 20
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.PERF_BASE_URL }}
        run: |
          export BASE_URL=${BASE_URL:-http://localhost:8080}
          mkdir -p perf/results
          k6 run perf/scripts/register_person_k6.js \
            --env BASE_URL="${BASE_URL}" \
            --env SCENARIO="load" \
            --env DATA_FILE="${{ github.workspace }}/perf/data/persons.csv"

      # stress: 5 + 3 + 2 = 10 min → timeout 16 min
      - name: Stress
        timeout-minutes: 16
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.PERF_BASE_URL }}
        run: |
          export BASE_URL=${BASE_URL:-http://localhost:8080}
          mkdir -p perf/results
          k6 run perf/scripts/register_person_k6.js \
            --env BASE_URL="${BASE_URL}" \
            --env SCENARIO="stress" \
            --env DATA_FILE="${{ github.workspace }}/perf/data/persons.csv"

      # handleSummary ya escribe perf/results/summary-{scenario}.json
      # no se necesita -o json ni --summary-export
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-register-person-results
          path: perf/results/**

      - name: Prepare registraduria tail
        if: always()
        run: |
          LOG="${GITHUB_WORKSPACE}/registraduria.log"
          TAIL_OUT="${GITHUB_WORKSPACE}/registraduria_tail.log"
          GZ_OUT="${GITHUB_WORKSPACE}/registraduria_tail.log.gz"
          if [ -f "$LOG" ]; then
            echo "Log size: $(stat -c%s "$LOG") bytes"
            tail -n 50000 "$LOG" > "$TAIL_OUT" || true
            gzip -c "$TAIL_OUT" > "$GZ_OUT" || true
          else
            touch "$TAIL_OUT"
            gzip -c "$TAIL_OUT" > "$GZ_OUT" || true
          fi

      - name: Upload registraduria tail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: registraduria-tail-log
          path: registraduria_tail.log.gz