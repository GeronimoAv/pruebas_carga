name: perf-register-voter
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  k6-perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build and run backend (registraduria)
        run: |
          set -e
          cd registraduria
          echo "Building registraduria..."
          mvn -DskipTests package || true
          echo "Starting registraduria with mvn spring-boot:run (background)..."
          nohup mvn -DskipTests spring-boot:run > ../registraduria.log 2>&1 &
      - name: Wait for backend to accept connections
        run: |
          # wait up to 120 seconds for the backend to be up
          for i in $(seq 1 60); do
            if bash -c "</dev/tcp/localhost/8080" >/dev/null 2>&1; then
              echo 'backend up' && exit 0
            fi
            sleep 2
          done
          echo 'backend did not start in time' >&2
          echo '--- registraduria.log (last 200 lines) ---'
          tail -n 200 ../registraduria.log || true
          echo '--- end log ---'
          exit 1
      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg2 ca-certificates
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
      - name: Baseline
        env:
          BASE_URL: ${{ secrets.PERF_BASE_URL }}
        run: |
          export BASE_URL=${BASE_URL:-http://localhost:8080}
          # Patch script at runtime to match controller path if needed (CI-only change)
          sed 's@/api/v1/voters/register@/register@g' perf/scripts/register_voter_k6.js > /tmp/register_voter_k6_runtime.js
          k6 run /tmp/register_voter_k6_runtime.js \
            -o json=perf/results/baseline.json \
            --env BASE_URL="${BASE_URL}" \
            --env SCENARIO="baseline" \
            --env DATA_FILE="${{ github.workspace }}/perf/data/voters.csv"
      - name: Load
        env:
          BASE_URL: ${{ secrets.PERF_BASE_URL }}
        run: |
          export BASE_URL=${BASE_URL:-http://localhost:8080}
          sed 's@/api/v1/voters/register@/register@g' perf/scripts/register_voter_k6.js > /tmp/register_voter_k6_runtime.js
          k6 run /tmp/register_voter_k6_runtime.js \
            -o json=perf/results/load.json \
            --env BASE_URL="${BASE_URL}" \
            --env SCENARIO="load" \
            --env DATA_FILE="${{ github.workspace }}/perf/data/voters.csv"
      - name: Stress
        env:
          BASE_URL: ${{ secrets.PERF_BASE_URL }}
        run: |
          export BASE_URL=${BASE_URL:-http://localhost:8080}
          sed 's@/api/v1/voters/register@/register@g' perf/scripts/register_voter_k6.js > /tmp/register_voter_k6_runtime.js
          k6 run /tmp/register_voter_k6_runtime.js \
            -o json=perf/results/stress.json \
            --env BASE_URL="${BASE_URL}" \
            --env SCENARIO="stress" \
            --env DATA_FILE="${{ github.workspace }}/perf/data/voters.csv"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-register-voter-results
          path: perf/results/**
